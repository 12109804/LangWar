<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/css/start_screen.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../src/css/puzzle_main.css">
    <title>LangWar</title>
</head>
<body>
    <!-- ゲームスタート画面 -->
    <div class="start-screen" id="start-screen">
        <h1 class="title-logo">
            <span class="logo">L</span>
            <span class="logo">a</span>
            <span class="logo">n</span>
            <span class="logo">g</span>
            <span class="logo">W</span>
            <span class="logo">a</span>
            <span class="logo">r</span>
        </h1>
        <div class="btn-container">
            <button id="start-btn" class="btn start-btn">START GAME</button>
            <button id="howto-btn" class="btn exit-btn">HOW TO PLAY</button>
            <button id="account-btn" class="btn exit-btn">ACCOUNT</button>
            <button id="setting-btn" class="btn setting-btn">Setting</button>
        </div>
    </div>
    <!-- ゲーム画面 -->
    <div id="game-screen" style="display: none;">
        <!-- スコア画面 -->
        <div class="sub-panel">
            <div class="score-title"></div>
            <div id="score-value" class="score-value">0</div>
        </div>
        <!-- ゲーム盤面 -->
        <div id="board"></div>
        <!-- ゲームオーバー画面 -->
        <div id="gameOver-screen" class="gameOver-screen" style="display: none;">
            <h1 class="gameOver-title">GAME OVER</h1>
            <div class="gameOver-score-box">
            <span>SCORE:</span>
            <span id="final-score">0</span>
        </div>
            <button id="retry-btn" class="retry-btn">RETRY</button>
            <button id="back-title-btn" class="back-title-btn">TITLE</button>
        </div>
    </div>
    <script type="module" src="../src/js/game.js/main.js" defer></script>
</body>
</html>
